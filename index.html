<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50-Rep Speech Drill</title>
    <style>
        /* CSS: Dark Theme inspired by TRAE */
        :root {
            --bg-color: #050505;
            --bg-card: #111111;
            --text-main: #f3f4f6;
            --text-heading: #ffffff;
            --text-muted: #9ca3af;
            --accent: #1ee57a;
            --accent-hover: #16c768;
            --border-color: #27272a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Dotted background pattern */
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* --- Header / Navigation --- */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            background-color: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-heading);
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent);
        }

        .difficulty-selector {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .difficulty-selector span {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 99px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-btn.active {
            color: var(--accent);
            border-color: var(--accent);
            background-color: rgba(30, 229, 122, 0.05);
        }

        /* --- Main Layout --- */
        main {
            width: 100%;
            max-width: 800px;
            padding: 140px 20px 60px 20px; /* Top padding clears the fixed header */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.04em;
            color: var(--text-heading);
            line-height: 1.1;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
        }

        /* Primary Button */
        .btn-primary {
            background-color: var(--accent);
            color: #000000;
            border: none;
            border-radius: 4px;
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 229, 122, 0.2);
        }

        /* --- Practice Area --- */
        #practiceArea {
            width: 100%;
            display: none;
            background-color: var(--bg-card);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.6s ease forwards;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skills-box {
            background-color: rgba(30, 229, 122, 0.05);
            border-left: 3px solid var(--accent);
            padding: 1.25rem 1.5rem;
            margin-bottom: 2.5rem;
            border-radius: 0 6px 6px 0;
        }

        .skills-box h3 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .skills-box p {
            color: var(--text-main);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .phase-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-heading);
        }

        .twister-group {
            margin-bottom: 2.5rem;
        }

        .group-focus {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .twister-item {
            display: flex;
            align-items: flex-start;
            padding: 0.85rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 1.2rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .twister-item:last-child {
            border-bottom: none;
        }

        .item-number {
            color: var(--text-muted);
            font-weight: 500;
            width: 3rem;
            flex-shrink: 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 1.1rem;
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
            .difficulty-selector span { display: none; }
            main { padding-top: 120px; }
            h1 { font-size: 2.8rem; }
            #practiceArea { padding: 1.5rem; }
            .twister-item { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo">TRAE<span>.speech</span></div>
        <div class="difficulty-selector" id="difficultyButtons">
            <span>Level:</span>
            <button class="nav-btn active" data-level="easy">Easy</button>
            <button class="nav-btn" data-level="medium">Medium</button>
            <button class="nav-btn" data-level="expert">Expert</button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>50-Rep Drill</h1>
            <p class="subtitle">Press generate to build clarity, confidence, and precision.</p>
            
            <button id="practiceBtn" class="btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Generate Today's Test
            </button>
        </div>

        <div id="practiceArea">
            <!-- Test Content is injected here -->
        </div>
    </main>

    <script>
        // Database structured by difficulty
        const practiceData = {
            easy: {
                skills: "Clear vowels • P, B, F, H sounds • Basic rhythm and pacing",
                twisters: [
                    "I scream, you scream, we all scream for ice cream.",
                    "A noisy noise annoys an oyster.",
                    "Toy boat, toy boat, toy boat.",
                    "Three free throws.",
                    "Eleven elephants eagerly eat Easter eggs.",
                    "He happily held his hat in his hand.",
                    "Friendly frogs frolicked freely from France.",
                    "A big black bear sat on a big black rug.",
                    "I saw Susie sitting in a shoe shine shop.",
                    "Give papa a cup of proper coffee in a copper coffee cup."
                ]
            },
            medium: {
                skills: "S vs SH • R vs L • Word endings • Consonant clusters • Speech precision",
                twisters: [
                    "She sells seashells by the seashore.",
                    "If a dog chews shoes, whose shoes does he choose?",
                    "Red lorry, yellow lorry.",
                    "Unique New York, you need unique New York.",
                    "Round and round the rugged rocks, the ragged rascal ran.",
                    "I slit the sheet, the sheet I slit, and on the slitted sheet, I sit.",
                    "Six slippery snails slid slowly seaward.",
                    "Near an ear, a nearer ear, a nearly eerie ear.",
                    "Can you can a can as a canner can can a can?",
                    "How can a clam cram in a clean cream can?"
                ]
            },
            expert: {
                skills: "TH sounds • Complex consonant combinations • Rapid articulation • Breath control • Advanced clarity",
                twisters: [
                    "The thirty-three thieves thought that they thrilled the throne throughout Thursday.",
                    "Sixth sick sheikh's sixth sheep's sick.",
                    "Irish wristwatch, Swiss wristwatch.",
                    "I wish to wash my Irish wristwatch.",
                    "Imagine an imaginary menagerie manager managing an imaginary menagerie.",
                    "She sees cheese, she sees cheese, she sees the cheese, she seized the cheese.",
                    "The seething sea ceaseth and thus the seething sea sufficeth us.",
                    "Six sick hicks nick six slick bricks with picks and sticks.",
                    "If two witches were watching two watches, which witch would watch which watch?",
                    "Pad kid poured curd pulled cod."
                ]
            }
        };

        let currentDifficulty = 'easy';
        
        // DOM Elements
        const diffButtons = document.querySelectorAll('.difficulty-selector button');
        const practiceBtn = document.getElementById('practiceBtn');
        const practiceArea = document.getElementById('practiceArea');

        // Handle Difficulty Selection in Header
        diffButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Remove active class from all nav buttons
                diffButtons.forEach(b => b.classList.remove('active'));
                // Add active class to the clicked one
                e.target.classList.add('active');
                // Update state
                currentDifficulty = e.target.getAttribute('data-level');
            });
        });

        // Handle Generation
        practiceBtn.addEventListener('click', () => {
            const data = practiceData[currentDifficulty];
            
            // Select 5 random, unique twisters from the chosen difficulty
            const shuffled = [...data.twisters].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 5);

            let htmlContent = '';
            let globalCounter = 1;

            // Inject the Skills Overview Box
            htmlContent += `
                <div class="skills-box">
                    <h3>Skills Trained (${currentDifficulty})</h3>
                    <p>${data.skills}</p>
                </div>
            `;

            // ---------------------------------------------------------
            // PHASE 1: Muscle Memory (5 consecutive reps per twister)
            // ---------------------------------------------------------
            htmlContent += `<h2 class="phase-title">Phase 1: Repetition (5x Each)</h2>`;
            
            for (let i = 0; i < 5; i++) {
                htmlContent += `
                    <div class="twister-group">
                        <div class="group-focus">Twister ${i + 1}</div>`;
                
                for (let j = 0; j < 5; j++) {
                    htmlContent += `
                        <div class="twister-item">
                            <span class="item-number">${String(globalCounter).padStart(2, '0')}.</span>
                            <span>${selected[i]}</span>
                        </div>`;
                    globalCounter++;
                }
                htmlContent += `</div>`;
            }

            // ---------------------------------------------------------
            // PHASE 2: Fluidity (Alternating through all 5 twisters, 5 times)
            // ---------------------------------------------------------
            htmlContent += `<h2 class="phase-title" style="margin-top: 4rem;">Phase 2: Alternating Flow (1-5 Sequence)</h2>`;
            
            for (let i = 0; i < 5; i++) {
                htmlContent += `<div class="twister-group">
                    <div class="group-focus">Full Set ${i + 1}</div>`;
                
                for (let j = 0; j < 5; j++) {
                    htmlContent += `
                        <div class="twister-item">
                            <span class="item-number">${String(globalCounter).padStart(2, '0')}.</span>
                            <span>${selected[j]}</span>
                        </div>`;
                    globalCounter++;
                }
                htmlContent += `</div>`;
            }

            // Render to screen
            practiceArea.innerHTML = htmlContent;
            
            // Reset animation
            practiceArea.style.display = 'none';
            setTimeout(() => {
                practiceArea.style.display = 'block';
                // Smooth scroll down to the test, pushing the header out of the way
                const y = practiceArea.getBoundingClientRect().top + window.scrollY - 100;
                window.scrollTo({top: y, behavior: 'smooth'});
            }, 10);
        });
    </script>
</body>
</html>
